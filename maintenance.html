<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le bon T4 — Maintenance</title>
    <style>
        :root {
            --red: #c0392b;
            --orange: #e67e22;
            --yellow: #f1c40f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at top, #1b1b1b, #0e0e0e);
            color: #eaeaea;
            font-family: system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .box {
            text-align: center;
            padding: 3rem 2.5rem;
            background: #161616;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 0 40px rgba(0, 0, 0, .6);
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 1.2rem;
        }

        h1 {
            color: var(--red);
            font-size: 1.8rem;
            margin-bottom: .8rem;
        }

        p {
            color: #9b9b9b;
            line-height: 1.6;
            margin-bottom: .5rem;
            font-size: .95rem;
        }

        .tagline {
            color: var(--yellow);
            font-style: italic;
            font-size: .85rem;
            margin-top: 1.5rem;
        }

        a {
            color: var(--orange);
            text-decoration: none;
            font-size: .82rem;
            display: block;
            margin-top: 1.5rem;
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="icon">🔧</div>
        <h1>Site en maintenance</h1>
        <p>Les potimarrons sont en cuisine.</p>
        <p>Revenez dans quelques instants.</p>
        <p class="tagline">"Un bon kebab, c'est un kebab de bonne qualité - 2026"</p>
        <a href="/login/index.html">Se connecter (personnel autorisé)</a>
    </div>
</body>

</html>
